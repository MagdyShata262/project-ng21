<section class="product-detail container py-4">
  <ng-container *ngIf="product.value() as product; else loading">
    <div class="row g-4">
      <div class="col-md-6">
        <mat-card class="product-card border-0 shadow-sm">
          <div class="product-image-wrapper">
            <img class="product-image" [src]="product.thumbnail" [alt]="product.title" />
          </div>
        </mat-card>
      </div>

      <div class="col-md-6">
        <mat-card class="product-card border-0 shadow-sm">
          <mat-card-content class="p-4">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div>
                <h1 class="product-title mb-1">{{ product.title }}</h1>
                <p class="product-brand mb-0">{{ product.brand }} · {{ product.category }}</p>
              </div>
              <span class="product-badge">{{ product.stock }} in stock</span>
            </div>

            <p class="product-description mb-4">{{ product.description }}</p>

            <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
              <div class="product-meta">
                <mat-icon>star</mat-icon>
                {{ product.rating | number:'1.1-1' }}
              </div>
              <div class="product-price">
                <strong>${{ product.price }}</strong>
                <small class="text-muted ms-2">{{ product.discountPercentage }}% off</small>
              </div>
            </div>

            <button mat-flat-button color="primary" class="w-100 mb-3" type="button">
              <mat-icon class="me-2">shopping_cart</mat-icon>
              Add to Cart
            </button>

            <button mat-stroked-button class="w-100" type="button">
              <mat-icon class="me-2">favorite</mat-icon>
              Add to Wishlist
            </button>
          </mat-card-content>
        </mat-card>
      </div>
    </div>

    <mat-divider class="my-4"></mat-divider>

    <div class="row">
      <div class="col-12">
        <h3 class="mb-3">Product Images</h3>
        <div class="d-flex gap-3 overflow-auto">
          <img *ngFor="let image of product.images" class="product-gallery-image" [src]="image" [alt]="product.title" />
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #loading>
    <div class="text-center py-5 text-secondary">
      <mat-icon>hourglass_top</mat-icon>
      Loading product details...
    </div>
  </ng-template>
</section>
